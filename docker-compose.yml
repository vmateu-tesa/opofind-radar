version: '3.8'

services:
  backend:
    build: .
    restart: unless-stopped
    volumes:
      - sqlite_data:/app/data
    env_file:
      - .env
    # Not exposed publicly, Nginx proxies to it

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3500:80"
    depends_on:
      - backend

volumes:
  sqlite_data:
