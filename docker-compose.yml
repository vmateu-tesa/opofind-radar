version: '3.8'

services:
  backend:
    build: .
    restart: unless-stopped
    volumes:
      - sqlite_data:/app/data
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ENABLE_TELEGRAM=${ENABLE_TELEGRAM:-0}
      - ENABLE_WHATSAPP=${ENABLE_WHATSAPP:-0}
    # Not exposed publicly, Nginx proxies to it

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3500:80"
    depends_on:
      - backend

volumes:
  sqlite_data:
