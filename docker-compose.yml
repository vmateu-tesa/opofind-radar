version: '3.8'

services:
  backend:
    build: .
    container_name: oporadar-backend
    restart: unless-stopped
    volumes:
      - sqlite_data:/app/data
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ENABLE_TELEGRAM=${ENABLE_TELEGRAM:-0}
      - ENABLE_WHATSAPP=${ENABLE_WHATSAPP:-0}
    # We do not expose 8000 to the public, Nginx will proxy it

  frontend:
    build: ./frontend
    container_name: oporadar-frontend
    restart: unless-stopped
    ports:
      - "8000:80"
    depends_on:
      - backend

volumes:
  sqlite_data:
