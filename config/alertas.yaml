# Perfiles de alertas para OpoRadar

perfiles:
  - nombre: "Informatica_Telecom"
    keywords:
      - "informática"
      - "informatico"
      - "informatica"
      - "telecomunicaciones"
      - "telecomunicacion"
      - "sistemas"
      - "redes"
      - "software"
      - "programador"
      - "datos"
      - "tecnologías de la información"
      - "TAI"
      - "T.A.I"
    exclusiones:
      - "turismo"

  - nombre: "Docencia_Secundaria_FP"
    keywords:
      - "profesor"
      - "profesora"
      - "secundaria"
      - "formación profesional"
      - "educador"
      - "educadora"
      - "docente"
      - "maestro"
      - "DAW"
      - "DAM"
      - "ASIR"
    exclusiones:
      - "música"
      - "danza"

  - nombre: "Admin_Marina_Baixa"
    keywords:
      - "benidorm"
      - "altea"
      - "alfaz del pi"
      - "l'alfàs del pi"
      - "la nucia"
      - "nucía"
      - "polop"
      - "villajoyosa"
      - "la vila joiosa"
      - "alicante"
      - "diputación"
    exclusiones:
      - "valencia"
      - "castellón"

  - nombre: "Global_Provincia"
    # Si keywords está vacío, notifica todo lo que no esté en exclusiones
    keywords: []
    exclusiones:
      - "médico"
      - "enfermero"
